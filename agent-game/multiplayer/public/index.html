<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Game Observer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #00d9ff;
            margin-bottom: 20px;
        }
        
        .connection {
            text-align: center;
            margin-bottom: 20px;
        }
        
        input {
            padding: 10px;
            border: 2px solid #16213e;
            border-radius: 5px;
            background: #0f3460;
            color: #eee;
            font-size: 14px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #e94560;
            color: white;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
        }
        
        button:hover {
            background: #ff6b6b;
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        
        .game-state {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
        }
        
        .panel h2 {
            color: #00d9ff;
            margin-bottom: 15px;
            border-bottom: 2px solid #e94560;
            padding-bottom: 10px;
        }
        
        .agent {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .agent-name {
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 5px;
        }
        
        .agent-role {
            color: #e94560;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .agent-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            font-size: 12px;
        }
        
        .stat {
            background: #16213e;
            padding: 5px;
            border-radius: 3px;
            text-align: center;
        }
        
        .hp-bar {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            transition: width 0.3s;
        }
        
        .room {
            background: #0f3460;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .room-name {
            font-weight: bold;
            color: #00d9ff;
            margin-bottom: 10px;
        }
        
        .room-info {
            font-size: 12px;
            color: #aaa;
        }
        
        .log {
            background: #0f3460;
            padding: 20px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 10px;
            padding: 10px;
            border-left: 3px solid #e94560;
            background: #16213e;
            font-size: 12px;
        }
        
        .log-time {
            color: #666;
            font-size: 10px;
        }
        
        .status {
            text-align: center;
            padding: 10px;
            background: #0f3460;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .status.connected {
            background: #0a3d0a;
        }
        
        .status.disconnected {
            background: #3d0a0a;
        }
        
        .turn-indicator {
            text-align: center;
            font-size: 24px;
            color: #00d9ff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Agent Game Observer</h1>
        
        <div class="connection">
            <input type="text" id="roomId" placeholder="Room ID" value="">
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
        </div>
        
        <div id="status" class="status disconnected">
            Disconnected
        </div>
        
        <div id="turnIndicator" class="turn-indicator" style="display: none;">
            Turn: <span id="turnNumber">0</span>
        </div>
        
        <div class="game-state">
            <div class="panel">
                <h2>👥 Agents</h2>
                <div id="agentsList">
                    <p style="color: #666;">Waiting for connection...</p>
                </div>
            </div>
            
            <div class="panel">
                <h2>🏰 Dungeon</h2>
                <div id="dungeonInfo">
                    <p style="color: #666;">Waiting for connection...</p>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h2>📜 Game Log</h2>
            <div class="log" id="gameLog">
                <p style="color: #666; text-align: center;">No events yet...</p>
            </div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let gameState = null;
        
        function connect() {
            const roomId = document.getElementById('roomId').value || `room_${Date.now()}`;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/game/${roomId}`;
            
            updateStatus('Connecting...', false);
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                updateStatus('Connected (Observing)', true);
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                
                // 加入为观察者
                ws.send(JSON.stringify({
                    type: 'join',
                    aiId: `observer_${Date.now()}`,
                    aiConfig: {
                        name: 'Observer',
                        role: 'warrior'
                    }
                }));
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateStatus('Connection Error', false);
            };
            
            ws.onclose = () => {
                updateStatus('Disconnected', false);
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
            };
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
        
        function updateStatus(text, connected) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = text;
            statusEl.className = `status ${connected ? 'connected' : 'disconnected'}`;
        }
        
        function handleMessage(msg) {
            console.log('Message:', msg);
            
            switch (msg.type) {
                case 'joined':
                case 'game_started':
                case 'turn_start':
                case 'turn_end':
                    if (msg.gameState) {
                        gameState = msg.gameState;
                        updateGameState();
                    }
                    break;
                    
                case 'request_decision':
                    addLog(`Turn ${msg.turn}: Requesting decisions...`);
                    break;
                    
                case 'action_executed':
                    addLog(`${msg.agentName}: ${msg.action}${msg.target ? ' → ' + msg.target : ''} (${msg.reason})`);
                    break;
                    
                case 'game_ended':
                    addLog(`Game Over: ${msg.reason}`);
                    break;
                    
                case 'error':
                    addLog(`Error: ${msg.error}`, true);
                    break;
            }
        }
        
        function updateGameState() {
            if (!gameState) return;
            
            // 更新回合数
            document.getElementById('turnIndicator').style.display = 'block';
            document.getElementById('turnNumber').textContent = gameState.turn || 0;
            
            // 更新 Agent 列表
            const agentsList = document.getElementById('agentsList');
            if (gameState.agents && gameState.agents.length > 0) {
                agentsList.innerHTML = gameState.agents.map(agent => `
                    <div class="agent">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role}</div>
                        <div class="agent-stats">
                            <div class="stat">HP: ${agent.stats.hp}/${agent.stats.maxHp}</div>
                            <div class="stat">ATK: ${agent.stats.attack}</div>
                            <div class="stat">DEF: ${agent.stats.defense}</div>
                        </div>
                        <div class="hp-bar">
                            <div class="hp-fill" style="width: ${(agent.stats.hp / agent.stats.maxHp) * 100}%"></div>
                        </div>
                    </div>
                `).join('');
            }
            
            // 更新地牢信息
            const dungeonInfo = document.getElementById('dungeonInfo');
            if (gameState.dungeon) {
                dungeonInfo.innerHTML = `
                    <div class="room">
                        <div class="room-name">Level ${gameState.dungeon.level}</div>
                        <div class="room-info">${gameState.dungeon.rooms?.length || 0} rooms</div>
                    </div>
                `;
            }
        }
        
        function addLog(text, isError = false) {
            const logEl = document.getElementById('gameLog');
            const time = new Date().toLocaleTimeString();
            
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.borderLeftColor = isError ? '#ff0000' : '#e94560';
            entry.innerHTML = `
                <div class="log-time">${time}</div>
                <div>${text}</div>
            `;
            
            // 移除占位文本
            if (logEl.querySelector('p')) {
                logEl.innerHTML = '';
            }
            
            logEl.insertBefore(entry, logEl.firstChild);
            
            // 限制日志数量
            while (logEl.children.length > 100) {
                logEl.removeChild(logEl.lastChild);
            }
        }
        
        // 自动连接
        window.onload = () => {
            // 可以在这里自动连接
        };
    </script>
</body>
</html>
